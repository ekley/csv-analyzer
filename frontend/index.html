<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Data Analyzer</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-soft: #eff6ff;
      --danger-bg: #fef2f2;
      --danger-text: #b91c1c;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      background-image: radial-gradient(ellipse 120% 80% at 50% -20%, #dbeafe 0%, transparent 55%);
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    .hero {
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
      color: var(--text);
    }

    .hero .tagline {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 42em;
    }

    .hero .tagline code {
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      font-size: 0.8rem;
      padding: 0.2em 0.45em;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 6px;
      word-break: break-all;
    }

    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.25rem 1.35rem;
    }

    .upload-panel {
      margin-bottom: 1rem;
    }

    .upload-row {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 0.75rem;
    }

    .file-wrap {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 0.75rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      background: #f8fafc;
      transition: border-color 0.15s, background 0.15s;
    }

    .file-wrap:hover {
      border-color: #cbd5e1;
      background: #f1f5f9;
    }

    .file-wrap input[type="file"] {
      font-size: 0.82rem;
      max-width: 100%;
      cursor: pointer;
    }

    .file-name {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .file-name.has-file {
      color: var(--text);
      font-weight: 500;
    }

    button.primary {
      padding: 0.55rem 1.15rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      box-shadow: 0 1px 2px rgba(37, 99, 235, 0.25);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
    }

    button.primary:active:not(:disabled) {
      transform: translateY(1px);
    }

    button.primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    #status {
      min-height: 1.5rem;
      margin-top: 0.75rem;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .loading::before {
      content: "";
      width: 1rem;
      height: 1rem;
      border: 2px solid var(--accent-soft);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: var(--danger-bg);
      color: var(--danger-text);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid #fecaca;
      font-size: 0.9rem;
      margin-top: 0.75rem;
    }

    #results {
      margin-top: 1.25rem;
    }

    .results-block {
      margin-bottom: 1.5rem;
    }

    .results-block:last-child {
      margin-bottom: 0;
    }

    .section-heading {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.65rem;
    }

    .table-scroll {
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      font-variant-numeric: tabular-nums;
    }

    th, td {
      padding: 0.55rem 0.75rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }

    th:first-child, td:first-child {
      text-align: left;
    }

    thead th {
      background: #f8fafc;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    tbody tr:last-child td,
    tbody tr:last-child th {
      border-bottom: none;
    }

    tbody tr:hover td {
      background: #fafbfc;
    }

    tbody td {
      color: var(--text);
    }

    .empty {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
      padding: 1rem;
      text-align: center;
      background: #f8fafc;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
    }

    footer.note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <h1>CSV Data Analyzer</h1>
      <p class="tagline">
        Upload a CSV with numeric columns. Non-numeric cells are skipped. Endpoint:
        <code id="apiLabel"></code>
      </p>
    </header>

    <section class="panel upload-panel">
      <div class="upload-row">
        <div class="file-wrap">
          <input type="file" id="fileInput" accept=".csv,text/csv" />
          <span class="file-name" id="fileName" title="">No file chosen</span>
        </div>
        <button type="button" class="primary" id="analyzeBtn">Analyze CSV</button>
      </div>
      <div id="status"></div>
      <div id="error"></div>
    </section>

    <div id="results"></div>

    <footer class="note">Run the FastAPI server on port 8000 before analyzing.</footer>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/analyze";

    document.getElementById("apiLabel").textContent = API_URL;

    const fileInput = document.getElementById("fileInput");
    const fileNameEl = document.getElementById("fileName");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const resultsContainer = document.getElementById("results");

    fileInput.addEventListener("change", () => {
      const f = fileInput.files && fileInput.files[0];
      if (f) {
        fileNameEl.textContent = f.name;
        fileNameEl.classList.add("has-file");
        fileNameEl.title = f.name;
      } else {
        fileNameEl.textContent = "No file chosen";
        fileNameEl.classList.remove("has-file");
        fileNameEl.title = "";
      }
    });

    function fmt(v) {
      if (v === null || v === undefined || Number.isNaN(v)) return "—";
      if (typeof v === "number") return Number.isInteger(v) ? String(v) : v.toFixed(6).replace(/\.?0+$/, "");
      return String(v);
    }

    function clearOutput() {
      errorEl.innerHTML = "";
      resultsContainer.innerHTML = "";
      statusEl.innerHTML = "";
    }

    analyzeBtn.addEventListener("click", async () => {
      clearOutput();
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        errorEl.innerHTML = '<div class="error">Please choose a CSV file first.</div>';
        return;
      }

      const form = new FormData();
      form.append("file", file, file.name);

      analyzeBtn.disabled = true;
      statusEl.innerHTML = '<span class="loading">Processing</span>';

      try {
        const res = await fetch(API_URL, { method: "POST", body: form });
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Invalid response from server.");
        }
        if (!res.ok) {
          const detail = data && data.detail ? JSON.stringify(data.detail) : text;
          throw new Error(detail || "Request failed.");
        }

        statusEl.innerHTML = "";
        renderResults(data);
      } catch (e) {
        statusEl.innerHTML = "";
        errorEl.innerHTML =
          '<div class="error">' +
          (e.message || "Request failed. Is the server running at " + API_URL + "?") +
          "</div>";
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    function renderResults(data) {
      const cols = data.columns || [];
      const stats = data.stats || [];
      const corr = data.correlation || [];

      if (!cols.length) {
        resultsContainer.innerHTML = '<section class="panel"><p class="empty">No numeric columns found.</p></section>';
        return;
      }

      let html = '<section class="panel results-block">';
      html += '<h2 class="section-heading">Statistics per column</h2>';
      html += '<div class="table-scroll"><table><thead><tr>';
      html += "<th>Column</th><th>Mean</th><th>Median</th><th>Std dev</th><th>Min</th><th>Max</th>";
      html += "</tr></thead><tbody>";
      for (let i = 0; i < cols.length; i++) {
        const s = stats[i] || {};
        html += "<tr>";
        html += "<td>" + escapeHtml(cols[i]) + "</td>";
        html += "<td>" + fmt(s.mean) + "</td>";
        html += "<td>" + fmt(s.median) + "</td>";
        html += "<td>" + fmt(s.std) + "</td>";
        html += "<td>" + fmt(s.min) + "</td>";
        html += "<td>" + fmt(s.max) + "</td>";
        html += "</tr>";
      }
      html += "</tbody></table></div></section>";

      html += '<section class="panel results-block">';
      html += '<h2 class="section-heading">Correlation matrix</h2>';
      if (!corr.length) {
        html += '<p class="empty">No correlation data.</p>';
      } else {
        html += '<div class="table-scroll"><table><thead><tr><th></th>';
        for (let i = 0; i < cols.length; i++) {
          html += "<th>" + escapeHtml(cols[i]) + "</th>";
        }
        html += "</tr></thead><tbody>";
        for (let r = 0; r < corr.length; r++) {
          html += "<tr><th>" + escapeHtml(cols[r] !== undefined ? cols[r] : "Var " + r) + "</th>";
          const row = corr[r] || [];
          for (let c = 0; c < row.length; c++) {
            html += "<td>" + fmt(row[c]) + "</td>";
          }
          html += "</tr>";
        }
        html += "</tbody></table></div>";
      }
      html += "</section>";

      resultsContainer.innerHTML = html;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
